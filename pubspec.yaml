name: edurance_v3
description: AI-powered personalized learning app for Indian school children.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.9
  go_router: ^13.0.1
  supabase_flutter: ^2.4.0
  google_generative_ai: ^0.2.2
  lottie: ^3.0.0
  rive: ^0.13.4
  flutter_svg: ^2.0.10
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.2
  riverpod_lint: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
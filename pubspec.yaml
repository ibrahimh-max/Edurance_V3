name: edurance_v3
description: AI-powered personalized learning app for Indian school children.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  go_router: ^17.2.2
  supabase_flutter: ^2.4.0
  flutter_dotenv: ^6.0.1
  google_generative_ai: ^0.4.7
  lottie: ^3.0.0
  rive: ^0.14.6
  flutter_svg: ^2.0.10
  google_fonts: ^8.0.2
  flutter_tts: ^4.2.5
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/